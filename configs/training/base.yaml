batch_size_tokens: 524288   # global tokens/optimizer step; controls effective batch size
learning_rate: 1e-3         # chosen from sweep results
min_lr: 0.0                 # floor for LR decay; commonly ~learning_rate/10 - set once learning_rate is set
warmup_steps: null          # derived as total_steps // 10 in trainer - set here to override
weight_decay: 0.1
grad_clip: 1.0 
betas: [0.9, 0.95]          # AdamW momentum terms (beta1, beta2)
seed: 1337

# Logging / evaluation
log_interval: 10
eval_interval: 500          # run validation every N training steps
eval_iters: 50              # number of batches to average for each validation estimate
